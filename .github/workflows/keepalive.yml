name: Render keep-alive

# Render's free tier spins the backend down after ~15 min of inactivity, causing
# 30-60s cold starts that make mobile loads feel broken. This workflow pings
# /health every 10 minutes, 24/7, so the backend NEVER goes cold.
#
# Render free tier = 750 instance-hours/month. Continuous use is 720h (30-day
# month) to 744h (31-day month) — fits with ~6h safety margin even in May/Aug.

on:
  schedule:
    # Every 10 minutes, every hour, every day — well under Render's 15 min spin-down threshold
    - cron: "*/10 * * * *"

  # Manual trigger (for testing)
  workflow_dispatch:

# No need to email me on failure for a ping job
permissions:
  contents: read

jobs:
  ping:
    name: Ping backend /health
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake Render
        run: |
          # `|| true` so a transient hiccup never marks the job as failed
          # (would otherwise send a notification email every time).
          curl -s -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            --max-time 90 \
            "${{ secrets.RENDER_API_URL }}/health" || true
